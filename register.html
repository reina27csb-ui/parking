{% extends "base.html" %}
{% block title %}Register – SmartPark{% endblock %}
{% block content %}
<style>
.auth-wrap { max-width:400px; margin:3rem auto; }
.auth-wrap h1 { font-size:1.75rem; font-weight:700; text-align:center; margin-bottom:.5rem; }
.auth-wrap p { text-align:center; color:var(--muted); margin-bottom:1.75rem; font-size:.9rem; }
</style>
<div class="auth-wrap">
  <h1>Create Account</h1>
  <p>Join SmartPark to book slots instantly</p>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Choose a password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem;">Register →</button>
    </form>
  </div>
  <p style="text-align:center;margin-top:1rem;font-size:.875rem;color:var(--muted);">
    Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent)">Login</a>
  </p>
</div>
{% endblock %}
